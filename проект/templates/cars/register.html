{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация - ВКР: Каршеринг в городе Салехард</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <a href="{% url 'landing' %}" class="auth-back">← На главную</a>
    <section class="auth-card">
      <h1>Регистрация</h1>
      <p>Создайте аккаунт и получите доступ к бронированиям.</p>
      <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>Логин {{ form.username }}</label>
        <label>Email {{ form.email }}</label>
        <label>Пароль {{ form.password1 }}</label>
        <label>Подтверждение пароля {{ form.password2 }}</label>
        <button class="btn btn-red" type="submit">Создать аккаунт</button>
      </form>
      <p class="auth-note">Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
    </section>
  </main>
</body>
</html>
