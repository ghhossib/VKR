{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Смена пароля - ВКР: Каршеринг в городе Салехард</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <a href="{% url 'admin_users_list' %}" class="auth-back">← К пользователям</a>
    <section class="auth-card admin-form-card">
      <h1>Смена пароля: {{ user_obj.username }}</h1>
      <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label class="admin-field">Новый пароль {{ form.new_password1 }}</label>
        {{ form.new_password1.errors }}
        <label class="admin-field">Подтверждение пароля {{ form.new_password2 }}</label>
        {{ form.new_password2.errors }}
        <button type="submit" class="btn btn-red">Обновить пароль</button>
      </form>
    </section>
  </main>
</body>
</html>
